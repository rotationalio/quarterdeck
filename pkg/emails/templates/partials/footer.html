{{ define "footer" -}}
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 680px;"
  class="footer">
  <tr>
    <td style="padding: 20px; font-family: sans-serif; font-size: 14px; line-height: 16px; text-align: center">
      This email was sent for {{ .OrgName }} via {{ .AppName }} by <a href="https://www.rotational.io"
        target="_blank">Rotational Labs</a>
    </td>
  </tr>
  <!-- Anti-spam: physical address for CAN-SPAM compliance; keep machine-readable for filters, do not make visible -->
  <tr>
    <td class="footer-address" style="color: #ffffff; padding: 20px; text-align: center">
      <span class="unstyle-auto-detected-links">
        Rotational Labs, Inc. 202 N Cedar Ave, Suite #1, Owatonna, MN 55060, USA
      </span>
    </td>
  </tr>
</table>
{{- end }}
